<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Decision Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Business Decision System</h1>
        <form id="decisionForm">
            <input type="text" name="productName" placeholder="Product Name" required>
            <input type="number" name="stock" placeholder="Stock" required>
            <input type="number" name="sales" placeholder="Sales" required>
            <input type="number" name="demand" placeholder="Demand" required>
            <input type="number" step="0.01" name="price" placeholder="Price" required>
            <button type="submit">Get Decision</button>
        </form>
        <div id="results" style="display:none;">
            <h2>Results</h2>
            <p>Product: <span id="productName"></span></p>
            <p>Competitor Price: <span id="competitorPrice"></span></p>
            <p>Confidence: <span id="confidence"></span></p>
            <p>Decision Level: <span id="decisionLevel"></span></p>
            <p>Decision: <span id="decision"></span></p>
            <p>Summary: <span id="summary"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
